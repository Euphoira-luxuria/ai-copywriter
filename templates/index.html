<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能文案助手</title>
    <style>
        :root {
            --bg: #f8f9fb;
            --card: #ffffff;
            --text: #1a1a2e;
            --sub: #6b7280;
            --border: #e5e7eb;
            --accent: #6c5ce7;
            --accent-hover: #5a4bd1;
            --tag-bg: #f0eeff;
            --tag-text: #6c5ce7;
            --success: #10b981;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .header p {
            color: var(--sub);
            font-size: 14px;
        }

        /* Card */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .card-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title .icon { font-size: 20px; }

        /* Template selector */
        .template-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
        }
        .template-btn {
            padding: 14px 12px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--card);
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
        }
        .template-btn:hover {
            border-color: var(--accent);
            background: var(--tag-bg);
        }
        .template-btn.active {
            border-color: var(--accent);
            background: var(--tag-bg);
            color: var(--accent);
            font-weight: 600;
        }
        .template-btn .t-icon {
            display: block;
            font-size: 24px;
            margin-bottom: 4px;
        }

        /* Style pills */
        .style-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .style-pill {
            padding: 7px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--card);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .style-pill:hover { border-color: var(--accent); }
        .style-pill.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* Inputs */
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }
        @media (max-width: 600px) {
            .input-row { grid-template-columns: 1fr; }
            .template-grid { grid-template-columns: repeat(3, 1fr); }
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 5px;
            color: var(--sub);
        }
        input, textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border 0.2s;
            background: #fafbfc;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(108,92,231,0.1);
        }
        textarea { resize: vertical; min-height: 70px; }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            width: 100%;
            justify-content: center;
            padding: 14px;
            font-size: 16px;
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-primary:disabled {
            background: #c4b5fd;
            cursor: not-allowed;
        }
        .btn-outline {
            background: #fff;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover { background: #f9fafb; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }

        /* Result */
        .result-box {
            background: #fafbfc;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            min-height: 120px;
            white-space: pre-wrap;
            font-size: 14px;
            line-height: 1.8;
            position: relative;
        }
        .result-placeholder {
            color: #c4c4c4;
            text-align: center;
            padding: 40px;
            font-size: 14px;
        }

        .result-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        /* Loading */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            color: #fff;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
        }
        .toast.show { opacity: 1; }

        /* Error */
        .error-msg {
            color: #ef4444;
            background: #fef2f2;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 8px;
        }

        .generate-section { margin-top: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI 智能文案助手</h1>
            <p>小红书 · 朋友圈 · 短视频脚本 · 电商文案 · 简历优化 · 公众号推文</p>
        </div>

        <!-- 选择文案类型 -->
        <div class="card">
            <div class="card-title"><span class="icon">📋</span> 选择类型</div>
            <div class="template-grid" id="templateGrid"></div>
        </div>

        <!-- 选择风格 -->
        <div class="card">
            <div class="card-title"><span class="icon">🎨</span> 文案风格</div>
            <div class="style-row" id="styleRow"></div>
        </div>

        <!-- 输入信息 -->
        <div class="card">
            <div class="card-title"><span class="icon">✏️</span> 内容信息</div>
            <div class="input-row">
                <div>
                    <label>产品或主题 *</label>
                    <input type="text" id="topic" placeholder="例如：一款便携咖啡机">
                </div>
                <div>
                    <label>核心卖点 / 关键词</label>
                    <input type="text" id="keywords" placeholder="例如：3秒速热、迷你机身、高颜值">
                </div>
            </div>
            <div>
                <label>额外要求 <span style="color:var(--sub);font-weight:400;">（选填）</span></label>
                <textarea id="custom" placeholder="例如：突出送礼场景，语气要亲切、年轻化"></textarea>
            </div>
            <div class="generate-section">
                <button class="btn btn-primary" id="generateBtn" onclick="generate()">
                    ✨ 一键生成文案
                </button>
            </div>
        </div>

        <!-- 结果展示 -->
        <div class="card" id="resultCard" style="display:none;">
            <div class="card-title"><span class="icon">📝</span> 生成结果</div>
            <div class="result-box" id="resultBox">
                <div class="result-placeholder">点击上方按钮生成文案...</div>
            </div>
            <div class="result-actions">
                <button class="btn btn-outline btn-sm" onclick="copyResult()">📋 一键复制</button>
                <button class="btn btn-outline btn-sm" onclick="polish('expand')">📖 扩写</button>
                <button class="btn btn-outline btn-sm" onclick="polish('shorten')">📝 精简</button>
                <button class="btn btn-outline btn-sm" onclick="polish('rewrite')">🔄 重写</button>
                <button class="btn btn-outline btn-sm" onclick="polish('urgent')">🔥 增加紧迫感</button>
                <button class="btn btn-outline btn-sm" onclick="polish('formal')">💼 商务化</button>
            </div>
            <div id="errorMsg" class="error-msg" style="display:none;"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let currentTemplate = 'redbook';
        let currentStyle = '';
        let currentContent = '';
        let templates = {};

        // 模板图标
        const icons = { redbook: '📕', wechat: '💬', script: '🎬', product: '🛒', resume: '📄', gzh: '📰' };

        async function init() {
            const res = await fetch('/api/templates');
            templates = await res.json();
            renderTemplates();
            selectTemplate('redbook');
        }

        function renderTemplates() {
            const grid = document.getElementById('templateGrid');
            grid.innerHTML = Object.entries(templates).map(([key, t]) =>
                `<button class="template-btn" data-key="${key}" onclick="selectTemplate('${key}')">
                    <span class="t-icon">${icons[key] || '📝'}</span>${t.name}
                </button>`
            ).join('');
        }

        function selectTemplate(key) {
            currentTemplate = key;
            currentStyle = templates[key].styles[0];

            document.querySelectorAll('.template-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.template-btn[data-key="${key}"]`)?.classList.add('active');

            const styleRow = document.getElementById('styleRow');
            styleRow.innerHTML = templates[key].styles.map(s =>
                `<span class="style-pill${s === currentStyle ? ' active' : ''}" onclick="selectStyle('${s.replace(/'/g, "\\'")}')">${s}</span>`
            ).join('');
        }

        function selectStyle(style) {
            currentStyle = style;
            document.querySelectorAll('.style-pill').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
        }

        async function generate() {
            const topic = document.getElementById('topic').value.trim();
            const keywords = document.getElementById('keywords').value.trim();
            const custom = document.getElementById('custom').value.trim();

            if (!topic && !keywords) {
                showToast('请输入产品或主题');
                return;
            }

            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> 生成中...';

            const resultCard = document.getElementById('resultCard');
            resultCard.style.display = 'block';
            document.getElementById('resultBox').innerHTML = '<div class="result-placeholder">⏳ 正在生成...</div>';
            document.getElementById('errorMsg').style.display = 'none';

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        template: currentTemplate,
                        topic,
                        style: currentStyle,
                        keywords,
                        custom
                    })
                });
                const data = await res.json();
                if (data.success) {
                    currentContent = data.content;
                    document.getElementById('resultBox').textContent = data.content;
                } else {
                    document.getElementById('errorMsg').textContent = data.error;
                    document.getElementById('errorMsg').style.display = 'block';
                    document.getElementById('resultBox').innerHTML = '<div class="result-placeholder">生成失败，请重试</div>';
                }
            } catch (e) {
                document.getElementById('errorMsg').textContent = '网络错误：' + e.message;
                document.getElementById('errorMsg').style.display = 'block';
            }

            btn.disabled = false;
            btn.innerHTML = '✨ 一键生成文案';
        }

        async function polish(action) {
            if (!currentContent) return;

            const actions = { expand:'📖 扩写中...', shorten:'📝 精简中...', rewrite:'🔄 重写中...', urgent:'🔥 处理中...', formal:'💼 处理中...', casual:'处理中...' };
            const btn = event.target;
            const orig = btn.textContent;
            btn.textContent = actions[action] || '处理中...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/polish', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: currentContent, action })
                });
                const data = await res.json();
                if (data.success) {
                    currentContent = data.content;
                    document.getElementById('resultBox').textContent = data.content;
                }
            } catch (e) {
                showToast('润色失败');
            }

            btn.textContent = orig;
            btn.disabled = false;
        }

        function copyResult() {
            if (!currentContent) return;
            navigator.clipboard.writeText(currentContent).then(() => showToast('已复制到剪贴板'));
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        init();
    </script>
</body>
</html>
